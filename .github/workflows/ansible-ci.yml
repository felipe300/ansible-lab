name: CI Ansible Lab

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linting:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Run Ansible Lint
        run: ansible-lint . || true

  infrastructure:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker images
        working-directory: docker
        run: docker compose build

      - name: Start Docker Compose
        working-directory: docker
        run: docker compose up -d

      - name: Wait for LocalStack
        run: sleep 5

      - name: Check LocalStack Health
        run: curl -L http://localhost:4566/_localstack/health

      - name: Show Running Containers
        run: docker ps

      - name: Verify environment variables
        run: docker exec localstack env | grep AWS_DEFAULT_REGION

      - name: Show LocalStack Logs on Failure
        if: failure()
        run: docker logs localstack

      - name: Shutdown containers
        if: always()
        working-directory: docker
        run: docker compose down -v
