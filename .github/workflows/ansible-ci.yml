name: CI Ansible Lab

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linting:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Run Ansible Lint
        run: ansible-lint . || true

  infrastructure:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Detect Docker changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker:
              - 'docker/Dockerfile'
              - 'docker/docker-compose.yml'

      - name: Start Docker Compose with Build
        if: steps.changes.outputs.docker == 'true'
        working-directory: docker
        run: docker compose up -d --build

      - name: Start Docker Compose without Build
        if: steps.changes.outputs.docker != 'true'
        working-directory: docker
        run: docker compose up -d

      - name: Wait for LocalStack
        run: sleep 5

      - name: Check LocalStack Health
        run: curl -L http://localhost:4566/_localstack/health

      - name: Show Running Containers
        run: docker ps

      - name: Verify environment variables
        run: docker exec localstack env | grep AWS_DEFAULT_REGION

      - name: Show LocalStack Logs on Failure
        if: failure()
        run: docker logs localstack

      - name: Shutdown containers
        if: always()
        working-directory: docker
        run: docker compose down -v
